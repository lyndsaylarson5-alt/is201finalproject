<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Music Crossword</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--green:#5e8b7e;
--blue:#466995;
--beige:#f3e9dc;
--white:#ffffff;
}

body{
margin:0;
background:var(--beige);
font-family:Georgia,serif;
}

header{
background:linear-gradient(135deg,var(--green),var(--blue));
color:white;
padding:30px;
text-align:center;
}

h1{
font-family:"Playfair Display",serif;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.game{
display:grid;
grid-template-columns:420px 1fr;
gap:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,40px);
gap:1px;
background:black;
padding:1px;
width:max-content;
}

.cell{
position:relative;
width:40px;
height:40px;
background:white;
}

.cell input{
width:100%;
height:100%;
border:none;
text-align:center;
font-size:22px;
text-transform:uppercase;
font-weight:bold;
}

.cell input:focus{
outline:2px solid var(--blue);
}

.black{
background:black;
}

.number{
position:absolute;
top:2px;
left:3px;
font-size:9px;
}

.panel{
background:white;
padding:20px;
border-radius:12px;
}

h2{
font-family:"Playfair Display",serif;
color:var(--blue);
}

button{
background:var(--blue);
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:var(--green);
}

.correct{
background:#d7f3d7;
}

.result{
margin-top:15px;
font-weight:bold;
}

@media(max-width:900px){

.game{
grid-template-columns:1fr;
}

}

</style>
</head>
<body>

<header>
<h1>Daily Music Crossword</h1>
<p>Guess Billboard Hot 100 songs from lyric clues</p>
</header>

<div class="container">

<div class="game">

<div id="grid" class="grid"></div>

<div class="panel">

<h2>Across</h2>
<div id="across"></div>

<h2>Down</h2>
<div id="down"></div>

<br>

<button onclick="checkPuzzle()">Check Answers</button>
<button onclick="revealPuzzle()">Reveal Puzzle</button>

<div id="result" class="result"></div>

</div>

</div>

</div>

<script>

const puzzles = [

{
grid:[
["F","L","O","W","E","R","S","#","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["S","T","A","Y","#","#","#","#","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["E","S","P","R","E","S","S","O","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["A","N","T","I","H","E","R","O","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["F","O","R","T","N","I","G","H","T","#"],
["#","#","#","#","#","#","#","#","#","#"]
],

across:[
{
number:1,
answer:"FLOWERS",
clue:"'I can buy myself flowers'"
},
{
number:2,
answer:"STAY",
clue:"'I do the same thing I told you that I never would'"
},
{
number:3,
answer:"ESPRESSO",
clue:"'That's that me espresso'"
},
{
number:4,
answer:"ANTIHERO",
clue:"'It's me, hi, I'm the problem, it's me'"
},
{
number:5,
answer:"FORTNIGHT",
clue:"'I was supposed to be sent away'"
}
],

down:[]
},

{
grid:[
["S","E","N","O","R","I","T","A","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["C","R","U","E","L","#","#","#","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["A","S","I","T","W","A","S","#","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["S","T","A","Y","#","#","#","#","#","#"],
["#","#","#","#","#","#","#","#","#","#"],
["H","E","A","T","W","A","V","E","S","#"],
["#","#","#","#","#","#","#","#","#","#"]
],

across:[
{
number:1,
answer:"SENORITA",
clue:"'I love it when you call me señorita'"
},
{
number:2,
answer:"CRUEL",
clue:"From a Taylor Swift summer hit"
},
{
number:3,
answer:"ASITWAS",
clue:"Harry Styles hit"
},
{
number:4,
answer:"STAY",
clue:"Kid Laroi & Justin Bieber"
},
{
number:5,
answer:"HEATWAVES",
clue:"'Sometimes all I think about is you'"
}
],

down:[]
}

];

const puzzleIndex =
Math.floor(Date.now()/86400000)%puzzles.length;

const puzzle=puzzles[puzzleIndex];

const grid=document.getElementById("grid");

for(let r=0;r<puzzle.grid.length;r++){

for(let c=0;c<puzzle.grid[r].length;c++){

const value=puzzle.grid[r][c];

const div=document.createElement("div");

if(value==="#"){

div.className="cell black";

}else{

div.className="cell";

const input=document.createElement("input");

input.maxLength=1;

input.dataset.answer=value;

div.appendChild(input);

}

grid.appendChild(div);

}

}

const acrossDiv=document.getElementById("across");

puzzle.across.forEach(clue=>{

const p=document.createElement("p");

p.innerHTML=
"<strong>"+clue.number+".</strong> "+
clue.clue;

acrossDiv.appendChild(p);

});

document.getElementById("down").innerHTML=
"<p>This simplified version uses Across clues only.</p>";

function checkPuzzle(){

let total=0;
let correct=0;

document.querySelectorAll("input").forEach(input=>{

total++;

if(
input.value.toUpperCase()===
input.dataset.answer
){

input.classList.add("correct");
correct++;

}else{

input.classList.remove("correct");

}

});

document.getElementById("result").innerHTML=
correct+" / "+total+" letters correct";

if(correct===total){

document.getElementById("result").innerHTML=
"🎵 Perfect! Come back tomorrow for a new puzzle.";

}

localStorage.setItem(
"musicCrosswordProgress",
JSON.stringify(
[...document.querySelectorAll("input")]
.map(i=>i.value)
)
);

}

function revealPuzzle(){

document.querySelectorAll("input").forEach(input=>{

input.value=input.dataset.answer;

});

}

const saved=
JSON.parse(
localStorage.getItem("musicCrosswordProgress")
);

if(saved){

document
.querySelectorAll("input")
.forEach((input,index)=>{

if(saved[index]){

input.value=saved[index];

}

});

}

</script>

</body>
</html>
