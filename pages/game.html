<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Billboard Lyrics Crossword</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --green:#5E8B7E;
    --blue:#4A6FA5;
    --beige:#F3E9DC;
    --white:#FFFFFF;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--beige);
    font-family:Georgia, serif;
    color:#1d1d1d;
}

header{
    background:linear-gradient(135deg,var(--green),var(--blue));
    color:white;
    text-align:center;
    padding:30px;
}

h1{
    margin:0;
    font-family:"Playfair Display", serif;
    font-size:2.8rem;
}

.subtitle{
    margin-top:10px;
    font-size:1.1rem;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    margin-bottom:25px;
}

h2{
    font-family:"Playfair Display", serif;
    color:var(--blue);
}

.crossword{
    display:grid;
    gap:6px;
    justify-content:center;
    margin:25px 0;
}

.cell{
    width:50px;
    height:50px;
    text-transform:uppercase;
    text-align:center;
    font-size:1.3rem;
    border:2px solid var(--green);
    border-radius:8px;
    font-weight:bold;
}

.correct{
    background:#dff3e5;
}

.incorrect{
    background:#ffd8d8;
}

.clue{
    margin-bottom:18px;
    padding:15px;
    background:var(--beige);
    border-left:5px solid var(--blue);
    border-radius:10px;
}

.song-input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:2px solid var(--blue);
    border-radius:8px;
    font-size:1rem;
}

button{
    background:var(--blue);
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:1rem;
    margin-top:15px;
}

button:hover{
    background:var(--green);
}

.result{
    margin-top:20px;
    font-weight:bold;
    font-size:1.1rem;
}

footer{
    text-align:center;
    padding:25px;
    color:#666;
}
</style>
</head>
<body>

<header>
    <h1>Daily Lyrics Crossword</h1>
    <div class="subtitle">
        Guess Billboard Hot 100 songs from lyric clues.
        New puzzle every day.
    </div>
</header>

<div class="container">

<div class="card">
    <h2>Today's Puzzle</h2>

    <div id="date"></div>

    <div id="clues"></div>

    <button onclick="checkAnswers()">Check Answers</button>

    <div id="result" class="result"></div>
</div>

</div>

<footer>
    Billboard-inspired daily lyric challenge
</footer>

<script>

const puzzles = [

[
{
song:"BLINDING LIGHTS",
lyric:"I said, ooh, I'm blinded by the lights",
answer:"BLINDING LIGHTS"
},
{
song:"FLOWERS",
lyric:"I can buy myself flowers",
answer:"FLOWERS"
},
{
song:"ANTI HERO",
lyric:"It's me, hi, I'm the problem, it's me",
answer:"ANTI HERO"
},
{
song:"GOOD 4 U",
lyric:"Well good for you, you look happy and healthy",
answer:"GOOD 4 U"
},
{
song:"LEVITATING",
lyric:"Yeah, yeah, yeah, yeah, yeah, you want me",
answer:"LEVITATING"
}
],

[
{
song:"ESPRESSO",
lyric:"That's that me espresso",
answer:"ESPRESSO"
},
{
song:"AS IT WAS",
lyric:"In this world, it's just us",
answer:"AS IT WAS"
},
{
song:"STAY",
lyric:"I do the same thing I told you that I never would",
answer:"STAY"
},
{
song:"DRIVERS LICENSE",
lyric:"Guess you didn't mean what you wrote in that song about me",
answer:"DRIVERS LICENSE"
},
{
song:"INDUSTRY BABY",
lyric:"I told you long ago on the road",
answer:"INDUSTRY BABY"
}
],

[
{
song:"HEAT WAVES",
lyric:"Sometimes all I think about is you",
answer:"HEAT WAVES"
},
{
song:"SAVE YOUR TEARS",
lyric:"I saw you dancing in a crowded room",
answer:"SAVE YOUR TEARS"
},
{
song:"BAD HABITS",
lyric:"Every time you come around",
answer:"BAD HABITS"
},
{
song:"CRUEL SUMMER",
lyric:"It's cool, that's what I tell 'em",
answer:"CRUEL SUMMER"
},
{
song:"WATERMELON SUGAR",
lyric:"Tastes like strawberries on a summer evening",
answer:"WATERMELON SUGAR"
}
],

[
{
song:"BIRDS OF A FEATHER",
lyric:"I'll love you till the day that I die",
answer:"BIRDS OF A FEATHER"
},
{
song:"FORTNIGHT",
lyric:"I was supposed to be sent away",
answer:"FORTNIGHT"
},
{
song:"ROCKSTAR",
lyric:"I've been fuckin' hoes and poppin' pillies",
answer:"ROCKSTAR"
},
{
song:"SEÑORITA",
lyric:"I love it when you call me señorita",
answer:"SEÑORITA"
},
{
song:"EASY ON ME",
lyric:"Go easy on me baby",
answer:"EASY ON ME"
}
]

];

function daySeed(){
    const today = new Date();
    return Math.floor(today.getTime() / (1000*60*60*24));
}

const puzzle = puzzles[daySeed() % puzzles.length];

document.getElementById("date").innerHTML =
"<strong>" + new Date().toDateString() + "</strong>";

const cluesDiv = document.getElementById("clues");

puzzle.forEach((item,index)=>{

    const clue = document.createElement("div");
    clue.className = "clue";

    clue.innerHTML = `
        <strong>${index+1}.</strong>
        "${item.lyric}"
        <input
            class="song-input"
            id="answer${index}"
            placeholder="Song title">
    `;

    cluesDiv.appendChild(clue);
});

function normalize(text){
    return text
        .toUpperCase()
        .replace(/[^A-Z0-9]/g,"")
        .trim();
}

function checkAnswers(){

    let score = 0;

    puzzle.forEach((item,index)=>{

        const input =
            document.getElementById(`answer${index}`);

        if(
            normalize(input.value) ===
            normalize(item.answer)
        ){
            input.classList.remove("incorrect");
            input.classList.add("correct");
            score++;
        }
        else{
            input.classList.remove("correct");
            input.classList.add("incorrect");
        }

    });

    document.getElementById("result").innerHTML =
        `You got ${score} / ${puzzle.length} correct!`;

    if(score === puzzle.length){
        document.getElementById("result").innerHTML +=
            "<br><br>🎵 Perfect score! Come back tomorrow for a new puzzle.";
    }
}

</script>

</body>
</html>
